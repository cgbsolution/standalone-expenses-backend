<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ctaLabel}}</title>
  </head>
  <body style="font-family: Helvetica, Arial, sans-serif; color:#111; background:#f5f7fb; padding:24px;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:600px;margin:0 auto;background:#ffffff;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb;">
      <tr>
        <td style="background:#6d28d9;color:#fff;padding:18px 24px;font-size:18px;font-weight:600;">
          ExpGenie
        </td>
      </tr>
      <tr>
        <td style="padding:24px;">
          <p style="margin:0 0 14px 0;">Hi <strong>{{name}}</strong>,</p>
          <p style="margin:0 0 22px 0;color:#374151;line-height:1.5;">{{intro}}</p>
          <p style="margin:0 0 24px 0;">
            <a href="{{actionUrl}}" style="display:inline-block;background:#6d28d9;color:#ffffff;text-decoration:none;padding:12px 22px;border-radius:8px;font-weight:600;">{{ctaLabel}}</a>
          </p>
          <p style="margin:0 0 6px 0;color:#6B7280;font-size:13px;">Or paste this link into your browser:</p>
          <p style="margin:0 0 18px 0;word-break:break-all;">
            <a href="{{actionUrl}}" style="color:#6d28d9;font-size:13px;">{{actionUrl}}</a>
          </p>
          <p style="margin:24px 0 0 0;font-size:12px;color:#9CA3AF;">
            If you didn't expect this email you can safely ignore it. For security, this link expires after a while.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
